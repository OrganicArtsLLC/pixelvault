<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROTOTYPE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0b0e11; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
canvas { border: 1px solid #333; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// --- CONFIG ---
const W = 800, H = 600;
canvas.width = W; canvas.height = H;

// Scale canvas to fit window
function resize() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H) * 0.95;
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// --- INPUT ---
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; });

// --- ENTITIES ---
// Add your game objects here

// --- GAME STATE ---
let score = 0;
let frame = 0;

// --- UPDATE ---
function update() {
  frame++;

  // Your game logic here
}

// --- DRAW ---
function draw() {
  ctx.fillStyle = '#0b0e11';
  ctx.fillRect(0, 0, W, H);

  // Your rendering here

  // Score
  ctx.fillStyle = '#e8e9eb';
  ctx.font = '16px monospace';
  ctx.fillText('SCORE: ' + score, 10, 24);
}

// --- GAME LOOP ---
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
